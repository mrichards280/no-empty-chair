<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#413645" />
    <meta name="description" content="No Empty Chair is an Atlanta brand and content studio that keeps talented salons fully booked. Websites, branding, and short-form content that fills your chair." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Marcellus&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>No Empty Chair — Brand & Content Studio for Salons | Atlanta</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Hidden static form so Netlify detects "leads" at build time and captures
         submissions from the React popup. Field names must match the popup. -->
    <form name="leads" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="business" />
      <input type="text" name="instagram" />
      <input type="text" name="contact" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
  </body>
</html>
