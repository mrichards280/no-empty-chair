  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Hidden static form so Netlify detects "leads" at build time and captures
         submissions from the React popup. Field names must match the popup. -->
    <form name="leads" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="business" />
      <input type="text" name="instagram" />
      <input type="text" name="contact" />
      <input type="text" name="bot-field" />
    </form>

    <!-- Hidden static form so Netlify detects "teardown" and captures the intake. -->
    <form name="teardown" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="salon" />
      <input type="text" name="email" />
      <input type="text" name="years" />
      <input type="text" name="website" />
      <input type="text" name="instagram" />
      <input type="text" name="socials" />
      <input type="text" name="stats" />
      <input type="text" name="voice" />
      <input type="text" name="issue" />
      <input type="text" name="audience" />
      <input type="text" name="vision" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
