[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  # CI=true makes CRA treat lint warnings as errors. Set CI=false in Netlify env
  # if a harmless warning ever blocks a deploy.

# SPA routing: let React Router handle client-side routes (e.g. /admin)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
